services:
  mcp:
    image: "rendley-mcp"
    build: .
    expose:
      - "8787"

    env_file:
      - .env

    volumes:
      - rendley-mcp-cache:/var/cache/rendley-mcp

    tmpfs:
      - /tmp:size=1g,exec,mode=1777

    shm_size: "2gb"

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    init: true

    mem_limit: "4g"
    memswap_limit: "4g"
    mem_reservation: "1g"
    cpus: "2.0"

    restart: unless-stopped

volumes:
  rendley-mcp-cache:
